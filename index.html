        body {

        .body-serif {
            font-family: 'Lora', serif;
        }
        .body-pastel {
            font-family: 'Nunito', sans-serif;
        }
        
        /* Continuous Document Preview Styles - No more forced blank pages */
        .cv-preview-sheet {
            background-color: white;
            box-sizing: border-box;
            width: 100%;
            max-width: 210mm;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Screen Separation for Page breaks */
        @media screen {
            .cv-page {
                border-bottom: 2px dashed #e2e8f0;
                padding-bottom: 4rem;
                margin-bottom: 4rem;
                position: relative;
            }
            .cv-page:last-child {
                border-bottom: none;
                padding-bottom: 0;
                margin-bottom: 0;
            }
        }

        /* Responsive Mobile Container for Previews */
        .preview-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* STRICT PRINT CSS - Eliminates blank pages & forces defensive breaks on sections */
        @media print {
            body {
                background: white !important;
                color: black !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .no-print {
                display: none !important;
            }
            .cv-preview-sheet {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                width: 210mm !important;
                background: white !important;
                padding: 15mm 15mm !important;
            }
            /* Defensively avoid breaking inside cards or sections to stay elegant */
            .cv-section-block {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                margin-bottom: 20px !important;
            }
            .page-break {
                page-break-before: always !important;
                break-before: page !important;
            }
            .cv-page {
                page-break-after: always !important;
                break-after: page !important;
                padding-bottom: 0 !important;
                margin-bottom: 0 !important;
            }
            .cv-page:last-child {
                page-break-after: avoid !important;
                break-after: avoid !important;
            }
            #app-root {
                padding: 0 !important;
            }
        }
    </style>

            const [formStep, setFormStep] = useState(0);

            const [hiddenFields, setHiddenFields] = useState({}); // Stores which fields are hidden from final CV output
            const [selectedTemplate, setSelectedTemplate] = useState('elegant'); 
            
            const [isSaving, setIsSaving] = useState(false);
            const [saveIndicator, setSaveIndicator] = useState('Semua perubahan tersimpan');
            
            // Custom Notifications & Help States
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [confirmModal, setConfirmModal] = useState({ show: false, message: '', onConfirm: null });
            const [showExampleFieldId, setShowExampleFieldId] = useState(null);

            // Mobile Navigation Toggle
            const [isMobileNavOpen, setIsMobileNavOpen] = useState(false);

            // Toast Alert Helper
            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 4000);
            };

            // Confirm Dialog Helper
            const triggerConfirm = (message, onConfirm) => {
                setConfirmModal({ show: true, message, onConfirm });
            };

            // Load saved sessions, active drafts, and credentials on start
            useEffect(() => {
                const loggedLocalStorage = localStorage.getItem('cv_taaruf_logged_in') === 'true';
                const loggedSessionStorage = sessionStorage.getItem('cv_taaruf_logged_in') === 'true';
                const remember = localStorage.getItem('cv_taaruf_remember_me') === 'true';

                // Load all profiles from memory
                const rawProfiles = localStorage.getItem('cv_taaruf_profiles_db');
                if (rawProfiles) {
                    try {
                        setSavedProfiles(JSON.parse(rawProfiles));
                    } catch (e) {
                        console.error("Gagal memuat basis data profil:", e);
                    }
                }

                if ((remember && loggedLocalStorage) || loggedSessionStorage) {
                    setIsLoggedIn(true);
                    
                    // Recover active draft profile metadata if loaded
                    const lastActiveId = localStorage.getItem('cv_taaruf_active_profile_id');
                    if (lastActiveId) {
                        setActiveProfileId(lastActiveId);
                    }
                } else {
                    setIsLoggedIn(false);
                }
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginPassword === 'cvgen123') {
                    if (rememberMe) {
                        localStorage.setItem('cv_taaruf_logged_in', 'true');
                        localStorage.setItem('cv_taaruf_remember_me', 'true');
                    } else {
                        sessionStorage.setItem('cv_taaruf_logged_in', 'true');
                        localStorage.setItem('cv_taaruf_remember_me', 'false');
                    }
                    setIsLoggedIn(true);
                    setLoginError('');
                    showToast('Berhasil masuk! Selamat datang di CV Ta’aruf Generator.');
                } else {
                    setLoginError('Kata sandi salah. Silakan periksa kembali email pembelian Anda.');

            const handleLogout = () => {

                setIsLoggedIn(false);
                setStep('home');
                showToast('Anda telah keluar.');

            // Update & persist list of profiles to localStorage
            const persistProfilesList = (newList) => {
                setSavedProfiles(newList);
                localStorage.setItem('cv_taaruf_profiles_db', JSON.stringify(newList));
            };

            // Saves current live editing data to a persistent profile
            const handleSaveCurrentProfile = (silent = false) => {
                if (!isLoggedIn) return;
                setSaveIndicator('Menyimpan...');
                setIsSaving(true);

                const currentName = answers.nama_lengkap || "Tanpa Nama";
                const profileId = activeProfileId || 'profile_' + Date.now();

                const updatedProfile = {
                    id: profileId,
                    name: currentName,
                    gender: gender,
                    mode: mode,
                    formStep: formStep,
                    answers: answers,
                    hiddenFields: hiddenFields,
                    selectedTemplate: selectedTemplate,
                    updatedAt: new Date().toISOString()
                };

                let exists = false;
                const updatedList = savedProfiles.map((p) => {
                    if (p.id === profileId) {
                        exists = true;
                        return updatedProfile;
                    }
                    return p;
                });

                if (!exists) {
                    updatedList.push(updatedProfile);
                }

                persistProfilesList(updatedList);
                setActiveProfileId(profileId);
                localStorage.setItem('cv_taaruf_active_profile_id', profileId);

                setTimeout(() => {
                    setSaveIndicator('Tersimpan di daftar');
                    setIsSaving(false);
                    if (!silent) {
                        showToast(`Berhasil menyimpan data "${currentName}" ke basis data lokal Anda!`);
                    }
                }, 400);
            };

            const triggerAutoSave = (currentAnswers, currentHidden, currentTemplate) => {
                if (!activeProfileId) return; // Only auto-saves if already initialized as a loaded profile

                const updatedList = savedProfiles.map((p) => {
                    if (p.id === profileId) {
                        return {
                            ...p,
                            answers: currentAnswers,
                            hiddenFields: currentHidden,
                            selectedTemplate: currentTemplate,
                            updatedAt: new Date().toISOString()
                        };
                    }
                    return p;
                });
                persistProfilesList(updatedList);

                setFormStep(profile.formStep || 0);
                setAnswers(profile.answers || {});

                let hasError = false;
                activeCategory.fields.forEach(field => {
                    if (field.required && !answers[field.id]) {
                        hasError = true;
                    }
                });

                if (hasError) {
                    showToast("Mohon lengkapi kolom wajib diisi (bertanda bintang) sebelum melanjutkan.", "error");
                    return;
                }

                if (formStep < questionsList.length - 1) {
                    const nextStep = formStep + 1;
                    setFormStep(nextStep);
                    handleSaveCurrentProfile(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    handleSaveCurrentProfile(true);
                    setStep('review_before_submit');
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                if (formStep > 0) {
                    const prevStep = formStep - 1;
                    setFormStep(prevStep);
                    handleSaveCurrentProfile(true);

                const total = cat.fields.length;
                let filled = 0;
                cat.fields.forEach(f => {
                    if (answers[f.id] && answers[f.id] !== "" && (!Array.isArray(answers[f.id]) || answers[f.id].length > 0)) {

                return { filled, total, percent: Math.round((filled / total) * 100) };

                const lines = text.split('\n');
                return lines.map((line, idx) => {

                                                                                        newVal.push(opt);
                                                                                    } else {
                                                                                        newVal = newVal.filter(item => item !== opt);
                                                                                    }

                                                        {gender === 'ikhwan' && answers.pria_kesiapan_nafkah && !hiddenFields.pria_kesiapan_nafkah && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 block font-bold uppercase mb-1">Kesiapan Menanggung Nafkah Utama</span>
                                                                <p class="text-slate-800 font-medium">{answers.pria_kesiapan_nafkah}</p>
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Financial Info & Assets Section (Advanced Mode Only) */}
                                                    {mode === 'advanced' && (
                                                        <div class="mt-8 pt-6 border-t border-slate-100 space-y-4 text-xs sm:text-sm">
                                                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Informasi Finansial & Amanah Harta</h4>
                                                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                                {answers.hutang_pribadi && !hiddenFields.hutang_pribadi && (
                                                                    <div>
                                                                        <span class="text-[10px] text-slate-400 font-semibold block">Hutang Pribadi</span>
                                                                        <span class="font-semibold text-slate-800">{answers.hutang_pribadi}</span>
                                                                    </div>
                                                                )}
                                                                {answers.estimasi_hutang && !hiddenFields.estimasi_hutang && (
                                                                    <div>
                                                                        <span class="text-[10px] text-slate-400 font-semibold block">Estimasi Keperluan Hutang</span>
                                                                        <span class="font-semibold text-slate-800">{answers.estimasi_hutang}</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                            {answers.aset_dimiliki && answers.aset_dimiliki.length > 0 && !hiddenFields.aset_dimiliki && (
                                                                <div>
                                                                    <span class="text-[10px] text-slate-400 font-semibold block mb-1">Aset yang Sudah Dimiliki</span>
                                                                    <div class="flex flex-wrap gap-2 mt-1">
                                                                        {answers.aset_dimiliki.map((aset, index) => (
                                                                            <span key={index} class={`text-xs px-2.5 py-1 rounded-md font-bold ${tStyles.pillBg}`}>
                                                                                {aset}
                                                                            </span>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {answers.prinsip_uang_keluarga && !hiddenFields.prinsip_uang_keluarga && (
                                                                <div class="p-4 rounded-xl bg-amber-50/50 border border-amber-100">
                                                                    <span class="text-[10px] text-amber-800 font-bold block uppercase mb-1">Prinsip Keuangan Keluarga</span>
                                                                    <p class="text-slate-700 italic font-medium">"{answers.prinsip_uang_keluarga}"</p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}

                                                </div>
                                                <div class="text-[10px] text-slate-400 text-center font-medium">Lembar Finansial, Pendidikan & Karir</div>
                                            </div>
                                        )}

                                        {/* PAGE 6: CONSOLIDATED IBADAH, NILAI KEISLAMAN & KEPRIBADIAN (Ibadah, Agama, Karakter, Penanganan Emosi) */}
                                        {(!hiddenFields.shalat_wajib || !hiddenFields.rutin_baca_quran || !hiddenFields.hafalan_quran || !hiddenFields.reaksi_marah || !hiddenFields.reaksi_kecewa || !hiddenFields.cara_diperlakukan_stres) && (
                                            <div class="cv-page min-h-[260mm] flex flex-col justify-between py-10">
                                                <div>
                                                    <h3 class={`${tStyles.categoryHeader} text-center uppercase tracking-wide text-xl sm:text-2xl font-bold`}>
                                                        4. Ibadah, Nilai Keislaman & Kepribadian
                                                    </h3>
                                                    
                                                    {/* Spiritual & Religious metrics */}
                                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs sm:text-sm mt-6">
                                                        {answers.shalat_wajib && !hiddenFields.shalat_wajib && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 font-bold block uppercase mb-1">Shalat Wajib</span>
                                                                <p class="text-slate-800 font-medium">{answers.shalat_wajib}</p>
                                                            </div>
                                                        )}
                                                        {answers.rutin_baca_quran && !hiddenFields.rutin_baca_quran && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 font-bold block uppercase mb-1">Rutinitas Al-Qur'an</span>
                                                                <p class="text-slate-800 font-medium">{answers.rutin_baca_quran}</p>
                                                            </div>
                                                        )}
                                                        {answers.hafalan_quran && !hiddenFields.hafalan_quran && (
                                                            <div>
                                                                <span class="text-[10px] text-slate-400 font-semibold block">Jumlah Hafalan</span>
                                                                <span class="font-semibold text-slate-800">{answers.hafalan_quran}</span>
                                                            </div>
                                                        )}
                                                        {answers.ustadz_sering_didengar && !hiddenFields.ustadz_sering_didengar && (
                                                            <div>
                                                                <span class="text-[10px] text-slate-400 font-semibold block">Ustadz yang Sering Didengar</span>
                                                                <span class="font-semibold text-slate-800">{answers.ustadz_sering_didengar}</span>
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Emotion Management & Habits */}
                                                    <div class="mt-8 pt-6 border-t border-slate-100 space-y-4 text-xs sm:text-sm">
                                                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Manajemen Emosi & Sifat Harian</h4>
                                                        {answers.reaksi_marah && !hiddenFields.reaksi_marah && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 block font-bold uppercase mb-1">Sikap Saat Marah</span>
                                                                <p class="text-slate-800 font-medium">{answers.reaksi_marah}</p>
                                                            </div>
                                                        )}
                                                        {answers.reaksi_kecewa && !hiddenFields.reaksi_kecewa && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 block font-bold uppercase mb-1">Sikap Saat Kecewa</span>
                                                                <p class="text-slate-800 font-medium">{answers.reaksi_kecewa}</p>
                                                            </div>
                                                        )}
                                                        {answers.cara_diperlakukan_stres && !hiddenFields.cara_diperlakukan_stres && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 block font-bold uppercase mb-1">Bagaimana Diperlakukan Saat Stres</span>
                                                                <p class="text-slate-800 font-medium">{answers.cara_diperlakukan_stres}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div class="text-[10px] text-slate-400 text-center font-medium">Lembar Pondasi Iman, Karakter & Adab</div>
                                            </div>
                                        )}

                                        {/* PAGE 7: VISI PERNIKAHAN, PREFERENSI & DEAL BREAKER (Visi Pernikahan, Kriteria Pasangan, Deal Breaker, Penutup) */}
                                        {(!hiddenFields.kriteria_pasangan || !hiddenFields.deal_breaker || !hiddenFields.hal_tidak_ditoleransi || !hiddenFields.alasan_menikah || !hiddenFields.target_menikah) && (
                                            <div class="cv-page min-h-[260mm] flex flex-col justify-between py-10">
                                                <div>
                                                    <h3 class={`${tStyles.categoryHeader} text-center uppercase tracking-wide text-xl sm:text-2xl font-bold`}>
                                                        5. Visi Pernikahan & Preferensi Pasangan
                                                    </h3>
                                                    <div class="space-y-4 text-xs sm:text-sm mt-6">
                                                        {answers.alasan_menikah && !hiddenFields.alasan_menikah && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 block font-bold uppercase mb-1">Niat & Alasan Ingin Menikah</span>
                                                                <p class="text-slate-800 font-medium whitespace-pre-line">{answers.alasan_menikah}</p>
                                                            </div>
                                                        )}
                                                        {answers.kriteria_pasangan && !hiddenFields.kriteria_pasangan && (
                                                            <div class={tStyles.cardBg}>
                                                                <span class="text-[10px] text-slate-400 block font-bold uppercase mb-1">Kriteria Pasangan Ideal</span>
                                                                <p class="text-slate-800 font-medium whitespace-pre-line">{answers.kriteria_pasangan}</p>
                                                            </div>
                                                        )}
                                                        {mode === 'basic' && answers.hal_tidak_ditoleransi && !hiddenFields.hal_tidak_ditoleransi && (
                                                            <div class="bg-red-50/50 p-4 border border-red-100 rounded-xl">
                                                                <span class="text-[10px] text-red-800 block font-bold uppercase mb-1">Hal yang tidak bisa ditoleransi</span>
                                                                <p class="text-slate-700 font-semibold">{answers.hal_tidak_ditoleransi}</p>
                                                            </div>
                                                        )}
                                                        {mode === 'advanced' && answers.deal_breaker && !hiddenFields.deal_breaker && (
                                                            <div class="bg-red-50/50 p-4 border border-red-100 rounded-xl">
                                                                <span class="text-[10px] text-red-800 block font-bold uppercase mb-1">DEAL BREAKER MUTLAK</span>
                                                                <p class="text-slate-700 font-semibold">{answers.deal_breaker}</p>
                                                            </div>
                                                        )}
                                                        {mode === 'advanced' && answers.pandangan_poligami && !hiddenFields.pandangan_poligami && (
                                                            <div class="p-4 border rounded-xl bg-slate-50/80">
                                                                <span class="text-[10px] text-slate-400 block font-bold mb-1">Pandangan tentang Poligami</span>
                                                                <p class="text-slate-700 font-medium italic">"{answers.pandangan_poligami}"</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                                {/* CV DECLARATION SIGNATURE AREA */}
                                                <div class="space-y-6 pt-10">
                                                    <div class={`p-6 rounded-2xl border ${tStyles.cardBg} border-t-4`}>
                                                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Pernyataan Singkat</h4>
                                                        <p class="text-xs text-slate-600 leading-relaxed italic mb-4">
                                                            "Data dalam CV ini saya isi dengan sebenar-benarnya sesuai kondisi saat ini. Semoga dokumen ini bisa menjadi ikhtiar awal untuk proses ta’aruf yang lebih jujur, terarah, dan bertanggung jawab."
                                                        </p>
                                                        <div class="flex justify-between items-center text-[10px] text-slate-400 border-t pt-3 font-semibold">
                                                            <span>Tanggal dibuat: {getCurrentDateFormatted()}</span>
                                                            <span class="font-bold uppercase text-slate-700">Nama: {answers.nama_lengkap || 'Tanpa Nama'}</span>
                                                        </div>
                                                    </div>

                                                    {/* DOCUMENT FOOTER PROTECTION PANEL */}
                                                    <div class="border-t pt-4 border-slate-100 text-center text-[9px] text-slate-300 font-medium uppercase tracking-wider">
                                                        Seluruh hak cipta dilindungi undang-undang • Faza Digital
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* Footer bar */}
                    <footer class="bg-white border-t border-slate-100 py-4 text-center text-[10px] sm:text-xs text-slate-400 no-print mt-auto">
                        <div class="max-w-7xl mx-auto px-4 space-y-1 font-medium">
                            <p>© 2026 CV Ta’aruf Generator. Dirancang secara profesional oleh Faza Digital.</p>
                            <p class="text-[9px]">Seluruh data diolah secara lokal di perangkat pengguna tanpa pernah dikirimkan ke server eksternal mana pun.</p>
                        </div>
                    </footer>

                    {/* Custom Toast Alert Notification */}
                    {toast.show && (
                        <div class="fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-3 animate-in fade-in slide-in-from-bottom-4 duration-300">
                            {toast.type === 'error' ? (
                                <span class="text-rose-400 font-bold text-base">⚠️</span>
                            ) : (
                                <span class="text-emerald-400 font-bold text-base">✓</span>
                            )}
                            <span class="text-xs sm:text-sm font-semibold tracking-wide">{toast.message}</span>
                        </div>
                    )}

                    {/* Custom Confirm Modal Dialog */}
                    {confirmModal.show && (
                        <div class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 no-print">
                            <div class="bg-white rounded-2xl max-w-sm w-full p-5 sm:p-6 shadow-xl border border-slate-100">
                                <div class="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-600 mb-4 text-2xl">
                                    ⚠️
                                </div>
                                <h3 class="text-lg font-bold text-slate-900 serif-title">Konfirmasi Tindakan</h3>
                                <p class="text-xs sm:text-sm text-slate-500 mt-2 leading-relaxed font-medium">{confirmModal.message}</p>
                                <div class="mt-6 flex gap-3">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false, message: '', onConfirm: null })} 
                                        class="w-1/2 px-4 py-2.5 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl font-medium text-xs sm:text-sm transition text-center"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (confirmModal.onConfirm) confirmModal.onConfirm();
                                            setConfirmModal({ show: false, message: '', onConfirm: null });
                                        }} 
                                        class="w-1/2 px-4 py-2.5 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-semibold text-xs sm:text-sm transition shadow-sm text-center"
                                    >
                                        Ya, Lakukan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('app-root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
